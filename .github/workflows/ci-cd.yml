name: Coffee POS System CI/CD

on:
  push:
    branches:
      - master
      - WIP

  pull_request:
    branches:
      - master
      - WIP

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Get project from repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # 3. Compile Java project (FIXED)
      - name: Compile Java Project
        run: |
          mkdir -p bin
          find src -name "*.java" > sources.txt
          javac -d bin -cp ".:lib/*" @sources.txt

      # 4. Confirm build success
      - name: Build Success Message
        run: echo "Coffee POS System built successfully!"
