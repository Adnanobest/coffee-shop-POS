name: Coffee POS System CI/CD

on:
  push:
    branches:
      - master
      - WIP

  pull_request:
    branches:
      - master
      - WIP

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Create lib directory
        run: mkdir -p lib

      - name: Compile Java Project
        run: |
          javac -cp ".:lib/*" src/pack1/*.java

      - name: Build Successful
        run: echo "Coffee POS System compiled successfully!"
