name: Coffee POS CI/CD

on:
  push:
    branches:
      - master
      - WIP
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Create output folder
        run: mkdir -p bin

      - name: Compile Java files
        run: |
          find . -name "*.java" > sources.txt
          javac -cp ".:lib/*" -d bin @sources.txt

      - name: Run basic class check
        run: |
          echo "Build successful. Listing compiled files:"
          ls -R bin
